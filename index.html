<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transformers.js Chat</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Cache-busting for script -->
  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.10.0/dist/transformers.min.js?v=20260531"></script>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h1>AI Chat</h1>
      <button id="initAiBtn" class="btn">Initialize AI</button>
      <div id="statusText" class="status-idle">Click 'Initialize AI' to start</div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">
      <div id="chatOutput" class="chat-output"></div>
      <div class="input-area">
        <input 
          type="text" 
          id="chatInput" 
          placeholder="Type your message..." 
          autocomplete="off"
        />
        <button id="sendBtn" class="btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- Load the fixed main JS -->
  <script src="app.js?v=20260531"></script>
</body>
</html>
