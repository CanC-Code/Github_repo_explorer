<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Repo Explorer & AI Architect</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
</head>
<body>
<header>
    <h1>GitHub Repo Explorer & AI Architect</h1>
    <p>Browse public GitHub repositories and review code locally using zero-cost Browser WebGPU LLMs</p>
</header>
<main>
    <div id="explorer-ui" class="input-container">
        <input type="text" id="repoInput" placeholder="Enter GitHub repo (owner/repo)">
        <button id="loadBtn">Load Repository</button>
    </div>
    <div id="repoInfo"></div>
    <div class="workspace-container">
        <div class="panel explorer-panel">
            <h2>Codebase Structure</h2>
            <div id="fileTree"></div>
        </div>
        <div class="panel ai-panel">
            <h2>Local AI Assistant (WebGPU)</h2>
            <div class="ai-controls">
                <label for="modelSelect">Model:</label>
                <select id="modelSelect">
                    <option value="Qwen2.5-Coder-1.5B-Instruct-q4f16_1-MLC">Qwen 2.5 Coder 1.5B (Fast)</option>
                    <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC">Phi-3 Mini 4K (General)</option>
                </select>
                <button id="initAiBtn">Initialize Model</button>
            </div>
            <div id="aiStatus" class="status-box">Status: Ready.</div>
            <div id="progressContainer" class="progress-container hidden">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="chatWindow" class="chat-window"></div>
            <div class="chat-input-container">
                <textarea id="chatInput" placeholder="Ask a question..." disabled></textarea>
                <button id="sendChatBtn" disabled>Send</button>
            </div>
        </div>
    </div>
</main>
<script type="module" src="script.js"></script>
</body>
</html>
